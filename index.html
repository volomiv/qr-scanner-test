<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR Scanner</title>

<style>
body {
  font-family: system-ui;
  padding: 20px;
  background: #111;
  color: #fff;
}

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  margin: 6px 0;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

#start { background: #0a84ff; color: white; }
#stop { background: #444; color: white; }
#copy { background: #2ecc71; color: white; }
#clear { background: #b00020; color: white; }

.scanner {
  position: relative;
  margin-top: 15px;
  display: none;
  border-radius: 12px;
  overflow: hidden;
}

video { width: 100%; }

.frame {
  position: absolute;
  inset: 15%;
  border: 3px solid white;
  border-radius: 12px;
  box-shadow: 0 0 0 999px rgba(0,0,0,0.4);
}

.line {
  position: absolute;
  left: 10%;
  right: 10%;
  height: 3px;
  background: lime;
  animation: scan 1.5s infinite;
}

@keyframes scan {
  0% { top: 20%; }
  100% { top: 80%; }
}

.swipe-wrap {
  position: relative;
  overflow: hidden;
  margin-top: 10px;
}

.swipe-btn {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 120px;
  background: #0a84ff;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  z-index: 1;
}

.item {
  background: #222;
  padding: 12px;
  border-radius: 10px;
  word-break: break-word;
  transform: translateX(0);
  transition: transform 0.2s ease;
  position: relative;
  z-index: 2;
}

.history-time {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 6px;
}

.status {
  margin-top: 10px;
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<h2>QR Scanner</h2>

<button id="start">Start Scan</button>
<button id="stop" disabled>Stop</button>

<div class="scanner" id="scanner">
  <video id="video" playsinline></video>
  <div class="frame"></div>
  <div class="line"></div>
</div>

<div class="status" id="status">Press Start</div>

<h3>Latest:</h3>
<div id="latest"></div>
<button id="copy">Copy Latest</button>

<h3>History:</h3>
<div id="history"></div>

<button id="clear">Clear History</button>

<script>
let stream = null;
let scanning = false;
let detector = null;
let latestValue = "";

const STORAGE_KEY = "qr_scanner_history";

const video = document.getElementById("video");
const scanner = document.getElementById("scanner");
const historyEl = document.getElementById("history");
const latestEl = document.getElementById("latest");
const status = document.getElementById("status");

function setStatus(msg) {
  status.textContent = msg;
}

function isLink(v) {
  try {
    const u = new URL(v);
    return u.protocol === "http:" || u.protocol === "https:";
  } catch { return false; }
}

function openLink(v) {
  if (!isLink(v)) {
    setStatus("Not a link");
    return;
  }
  window.open(v, "_blank");
}

function copyText(v) {
  if (!v) return;
  navigator.clipboard.writeText(v);
  setStatus("Copied ✔");
}

function getHistory() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveHistory(h) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
}

function addToHistory(value) {
  const h = getHistory();
  h.unshift({ value, time: new Date().toLocaleString() });
  saveHistory(h);
  render();
}

function createSwipeItem(html, value) {
  const wrap = document.createElement("div");
  wrap.className = "swipe-wrap";

  const btn = document.createElement("div");
  btn.className = "swipe-btn";
  btn.textContent = "Open";
  btn.onclick = () => openLink(value);

  const item = document.createElement("div");
  item.className = "item";
  item.innerHTML = html;
  item.onclick = () => copyText(value);

  let startX = 0;
  let currentX = 0;

  item.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  item.addEventListener("touchmove", e => {
    currentX = e.touches[0].clientX;
    let dx = currentX - startX;

    if (dx < 0) {
      item.style.transform = `translateX(${Math.max(dx, -120)}px)`;
    }
  });

  item.addEventListener("touchend", () => {
    let dx = currentX - startX;

    if (dx < -80 && isLink(value)) {
      item.style.transform = "translateX(-120px)";
    } else {
      item.style.transform = "translateX(0)";
      if (dx < -80) setStatus("Not a link");
    }
  });

  wrap.appendChild(btn);
  wrap.appendChild(item);

  return wrap;
}

function render() {
  const h = getHistory();

  historyEl.innerHTML = "";
  latestEl.innerHTML = "";

  if (latestValue) {
    const latest = createSwipeItem(latestValue, latestValue);
    latestEl.appendChild(latest);
  }

  h.forEach(i => {
    const el = createSwipeItem(
      `<div class="history-time">${i.time}</div>${i.value}`,
      i.value
    );
    historyEl.appendChild(el);
  });
}

async function startScan() {
  try {
    if (!("BarcodeDetector" in window)) {
      setStatus("Not supported");
      return;
    }

    const formats = await BarcodeDetector.getSupportedFormats();
    if (!formats.includes("qr_code")) {
      setStatus("QR not supported");
      return;
    }

    detector = new BarcodeDetector({ formats: ["qr_code"] });

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    scanner.style.display = "block";
    await video.play();

    scanning = true;
    setStatus("Scanning...");

    scanLoop();
  } catch (e) {
    setStatus("Camera error");
  }
}

function stopCamera(msg="Stopped") {
  scanning = false;

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  scanner.style.display = "none";
  setStatus(msg);
}

async function scanLoop() {
  if (!scanning) return;

  const codes = await detector.detect(video);

  if (codes.length > 0) {
    const v = codes[0].rawValue;
    latestValue = v;

    addToHistory(v);
    stopCamera("QR detected ✔");
    return;
  }

  requestAnimationFrame(scanLoop);
}

document.getElementById("start").onclick = startScan;
document.getElementById("stop").onclick = () => stopCamera();
document.getElementById("copy").onclick = () => copyText(latestValue);

document.getElementById("clear").onclick = () => {
  localStorage.removeItem(STORAGE_KEY);
  latestValue = "";
  render();
};

render();
</script>

</body>
</html>
