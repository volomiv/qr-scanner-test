<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Scanner</title>

  <style>
    body {
      font-family: system-ui;
      padding: 20px;
      background: #111;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    #start { background: #0a84ff; color: white; }
    #stop { background: #444; color: white; }
    #copy { background: #2ecc71; color: white; }
    #clear { background: #b00020; color: white; }

    .scanner {
      position: relative;
      margin-top: 15px;
      display: none;
      border-radius: 12px;
      overflow: hidden;
    }

    video {
      width: 100%;
      display: block;
    }

    .frame {
      position: absolute;
      inset: 15%;
      border: 3px solid white;
      border-radius: 12px;
      box-shadow: 0 0 0 999px rgba(0,0,0,0.4);
    }

    .line {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 3px;
      background: lime;
      box-shadow: 0 0 10px lime;
      animation: scan 1.5s infinite;
    }

    @keyframes scan {
      0% { top: 20%; }
      100% { top: 80%; }
    }

    .result {
      margin-top: 15px;
      padding: 12px;
      background: #222;
      border-radius: 10px;
      min-height: 60px;
      word-break: break-word;
      cursor: pointer;
    }

    .history-item {
      margin-top: 10px;
      padding: 12px;
      background: #222;
      border-radius: 10px;
      word-break: break-word;
      cursor: pointer;
    }

    .history-time {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

<h2>QR Scanner</h2>

<button id="start">Start Scan</button>
<button id="stop" disabled>Stop</button>

<div class="scanner" id="scanner">
  <video id="video" playsinline></video>
  <div class="frame"></div>
  <div class="line"></div>
</div>

<div class="status" id="status">Press Start</div>

<h3>Latest result:</h3>
<div class="result" id="result">—</div>
<button id="copy">Copy Latest Result</button>

<h3>Scan history:</h3>
<div id="history"></div>
<button id="clear">Clear History</button>

<script>
let stream = null;
let scanning = false;
let detector = null;
let latestValue = "";

const STORAGE_KEY = "qr_scanner_history";

const video = document.getElementById("video");
const scanner = document.getElementById("scanner");
const result = document.getElementById("result");
const history = document.getElementById("history");
const status = document.getElementById("status");

const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const copyBtn = document.getElementById("copy");
const clearBtn = document.getElementById("clear");

function setStatus(msg) {
  status.textContent = msg;
}

function getHistory() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveHistory(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function renderHistory() {
  const items = getHistory();

  if (items.length === 0) {
    history.innerHTML = "<div class='status'>No scanned items yet.</div>";
    return;
  }

  history.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";

    div.innerHTML = `
      <div class="history-time">${item.time}</div>
      <div>${escapeHtml(item.value)}</div>
    `;

    div.onclick = () => copyText(item.value);
    history.appendChild(div);
  });
}

function addToHistory(value) {
  const items = getHistory();

  items.unshift({
    value,
    time: new Date().toLocaleString()
  });

  saveHistory(items);
  renderHistory();
}

async function copyText(text) {
  if (!text || text === "—") return;

  try {
    await navigator.clipboard.writeText(text);
    setStatus("Copied to clipboard ✔");
  } catch (e) {
    setStatus("Copy failed: " + e.message);
  }
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function stopCamera(msg = "Stopped") {
  scanning = false;

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  video.srcObject = null;
  scanner.style.display = "none";

  startBtn.disabled = false;
  stopBtn.disabled = true;

  setStatus(msg);
}

async function scanLoop() {
  if (!scanning) return;

  try {
    const codes = await detector.detect(video);

    if (codes.length > 0) {
      const value = codes[0].rawValue;

      latestValue = value;
      result.textContent = value;

      addToHistory(value);
      stopCamera("QR detected ✔ Camera closed.");

      return;
    }
  } catch (e) {}

  requestAnimationFrame(scanLoop);
}

async function startScan() {
  try {
    if (!("BarcodeDetector" in window)) {
      setStatus("Not supported on this browser");
      return;
    }

    const formats = await BarcodeDetector.getSupportedFormats();

    if (!formats.includes("qr_code")) {
      setStatus("QR not supported");
      return;
    }

    detector = new BarcodeDetector({ formats: ["qr_code"] });

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    scanner.style.display = "block";

    await video.play();

    scanning = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;

    setStatus("Scanning...");

    scanLoop();
  } catch (e) {
    setStatus("Camera error: " + e.message);
  }
}

startBtn.onclick = startScan;
stopBtn.onclick = () => stopCamera();

copyBtn.onclick = () => copyText(latestValue);
result.onclick = () => copyText(latestValue);

clearBtn.onclick = () => {
  localStorage.removeItem(STORAGE_KEY);
  latestValue = "";
  result.textContent = "—";
  renderHistory();
  setStatus("History cleared.");
};

renderHistory();
</script>

</body>
</html>
